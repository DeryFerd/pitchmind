name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/pitchmind/apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: projects/pitchmind/apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_API_URL: http://localhost:8000

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/pitchmind
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-${{ hashFiles('projects/pitchmind/pyproject.toml') }}
      - run: |
          pip install \
            fastapi uvicorn sqlalchemy alembic psycopg2-binary pydantic pydantic-settings \
            python-jose httpx celery redis ollama reportlab stripe \
            sentence-transformers numpy \
            pytest pytest-asyncio ruff
      - run: |
          tracked=$(git ls-files '**/.env' '**/.env.local' '**/.env.production' | grep -v '.env.example' || true)
          if [ -n "$tracked" ]; then
            echo "Secret env files must not be tracked: $tracked"
            exit 1
          fi
      - run: ruff check apps/ packages/
      - run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: packages/db:packages/geo-engine:packages/site-auditor:packages/harness:.
